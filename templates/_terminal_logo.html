<div class="terminal-logo" aria-label="Neverlol terminal logo" title="Neverlol">
  <span class="terminal-logo-prompt">&gt;</span>
  <svg viewBox="0 0 100 100" class="terminal-logo-n" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="invoiceLogoLeftBarGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#dddddd" />
      </linearGradient>
      <linearGradient id="invoiceLogoRightBarFade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#eeeeee" stop-opacity="1" />
        <stop offset="100%" stop-color="#eeeeee" stop-opacity="0.5" />
      </linearGradient>
      <linearGradient id="invoiceLogoDiagFade" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
        <stop offset="60%" stop-color="#eeeeee" stop-opacity="1" />
        <stop offset="100%" stop-color="#cccccc" stop-opacity="0.6" />
      </linearGradient>
    </defs>
    <rect x="28" y="22" width="10" height="56" fill="url(#invoiceLogoLeftBarGrad)" />
    <rect x="62" y="22" width="10" height="32" fill="url(#invoiceLogoRightBarFade)" />
    <polygon points="28,22 38,22 72,78 62,78" fill="url(#invoiceLogoDiagFade)" />
  </svg>
  <span class="terminal-logo-cursor">_</span>
</div>
