<svg xmlns="http://www.w3.org/2000/svg" width="160" height="128" viewBox="0 0 40 32" role="img" aria-label="Neverlol terminal logo">
  <rect x="0.5" y="0.5" width="39" height="31" rx="6" fill="#000000" stroke="rgba(255,255,255,0.2)"/>
  <text x="2" y="20" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="12" font-weight="700" fill="#0066FF">&gt;</text>
  <defs>
    <linearGradient id="terminalLogoLeftBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#dddddd" />
    </linearGradient>
    <linearGradient id="terminalLogoRightBarFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeeeee" stop-opacity="1" />
      <stop offset="100%" stop-color="#eeeeee" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="terminalLogoDiagFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="60%" stop-color="#eeeeee" stop-opacity="1" />
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0.6" />
    </linearGradient>
  </defs>
  <svg x="8" y="4" width="24" height="24" viewBox="0 0 100 100" fill="none" aria-hidden="true">
    <rect x="28" y="22" width="10" height="56" fill="url(#terminalLogoLeftBarGrad)" />
    <rect x="62" y="22" width="10" height="32" fill="url(#terminalLogoRightBarFade)" />
    <polygon points="28,22 38,22 72,78 62,78" fill="url(#terminalLogoDiagFade)" />
  </svg>
  <text x="28.5" y="21" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="10" font-weight="400" fill="#0066FF">_</text>
</svg>
